<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poetsen+One&display=swap" rel="stylesheet">
</head>

<body>
    <div class="warpper">
        <div class="container">
            <header class="header">
                <div class="logo">
                    <div class="logo-icon">
                        <span class="logo-iconText">H</span>
                    </div>
                    <span class="logo-text">HungTran</span>
                </div>
                <ul class="menu">
                    <li><a href="" class="menu-link">About</a></li>
                    <li><a href="" class="menu-link">Skills</a></li>
                    <li><a href="" class="menu-link">Portfolio</a></li>
                    <li><a href="" class="menu-link">Testimonial</a></li>
                </ul>
                <button class="header-button">Download CV</button>
            </header>
            <main>
                <section name="Welcome" id="" class="hero">
                    <div class="hero-top">
                        <div class="hero-content">
                            <div class="tagPart">Welcome</div>
                            <h1 class="hero-title text-h2"> I have
                                experience in <span>website
                                    programming</span>.</h1>
                            <p class="hero-text text-p2">I'm HungTran, a web programmer. I'm a recent graduate and I've
                                been involved in small-scale web projects for small teams.</p>
                            <div class="hero-listButton">
                                <button class="hero-button">Contact Me</button>
                                <button class="hero-button inverted-btn ">View Portfolio
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                        strokeWidth={1.5} stroke="currentColor" className="size-6" class="icon">
                                        <path strokeLinecap="round" strokeLinejoin="round"
                                            d="m4.5 19.5 15-15m0 0H8.25m11.25 0v11.25" />
                                    </svg>
                                </button>

                            </div>
                        </div>
                        <div class="hero-image">
                            <img src="https://wildwolf19101.github.io/detal-landingpage/public/image/hero-image.png"
                                alt="image" class="hero-img">
                        </div>
                    </div>
                    <div class="hero-bottom">Hello</div>
                </section>
                <section name="My Skills" id=""></section>
                <section name="Portfolio" id=""></section>
                <section name="Reviews" id=""></section>
                <section name="Contact" id=""></section>
            </main>
            <footer class="footer"></footer>
        </div>
    </div>
</body>

</html>
